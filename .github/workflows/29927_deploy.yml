name: 29927_deploy

on:
  workflow_run:
    workflows:
      - 29927_test
    types:
      - completed

  workflow_dispatch:

jobs:
  docker_deploy:
    name: Docker build in push
    runs-on: self-hosted

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Prevzemi kodo iz repozitorija
        uses: actions/checkout@v4

      - name: Prijava v DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Zgradi Docker sliko
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.REPO_NAME }}:latest .

      - name: Poslji Docker sliko na DockerHub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.REPO_NAME }}:latest
